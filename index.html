<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword, 
    sendPasswordResetEmail, 
    onAuthStateChanged, 
    signOut 
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
      apiKey: "AIzaSyBNKI7UZ6ALDOFKkDckrH2eoiSuhd98sK4",
      authDomain: "dashboard-inversiones-362cb.firebaseapp.com",
      projectId: "dashboard-inversiones-362cb",
      storageBucket: "dashboard-inversiones-362cb.firebasestorage.app",
      messagingSenderId: "123978189976",
      appId: "1:123978189976:web:4a839a907529aa183ad4ed",
      measurementId: "G-9B0XF5HGP5"
  };

  const errorEl = document.getElementById('auth-error');
  const successEl = document.getElementById('auth-success');
  const loginScreen = document.getElementById('login-screen');
  const dashboardScreen = document.getElementById('dashboard-screen');

  let auth;

  // Encapsulamos en un try/catch para que si falla la conexión de red/adblocker avise en pantalla
  try {
    const app = initializeApp(firebaseConfig);
    auth = getAuth(app);

    // Escuchar cambios de estado en la cuenta
    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginScreen.style.display = 'none';
        dashboardScreen.style.display = 'block';
        if (window.initDashboard) window.initDashboard();
      } else {
        loginScreen.style.display = 'flex';
        dashboardScreen.style.display = 'none';
      }
    });

  } catch (initializationError) {
    console.error(initializationError);
    errorEl.textContent = "Error crítico: El bloqueador de anuncios o tu navegador están bloqueando a Firebase.";
  }

  // Control global para el intercambio visual de paneles internos
  window.switchAuthPanel = function(panelName) {
    errorEl.textContent = '';
    successEl.textContent = '';
    
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    
    const title = document.getElementById('auth-box-title');
    const subtitle = document.getElementById('auth-box-subtitle');
    
    if(panelName === 'login') {
      document.getElementById('panel-login-form').classList.add('active');
      title.textContent = "📊 Inversiones 2026";
      subtitle.textContent = "Ingresa tus credenciales para acceder";
    } else if(panelName === 'register') {
      document.getElementById('panel-register-form').classList.add('active');
      title.textContent = "🔑 Registrarse";
      subtitle.textContent = "Crea una nueva cuenta de acceso";
    } else if(panelName === 'reset') {
      document.getElementById('panel-reset-form').classList.add('active');
      title.textContent = "🔄 Recuperación";
      subtitle.textContent = "Restablece tu contraseña por correo";
    }
  }

  // 1. LOGIN
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    if (!auth) return;
    errorEl.textContent = '';
    successEl.textContent = 'Verificando...';
    
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-password').value;

    signInWithEmailAndPassword(auth, email, pass)
      .then(() => successEl.textContent = '')
      .catch(error => {
        successEl.textContent = '';
        if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          errorEl.textContent = 'Correo o contraseña incorrectos.';
        } else {
          errorEl.textContent = 'Error: ' + error.message;
        }
      });
  });

  // 2. CREAR CUENTA
  document.getElementById('register-form').addEventListener('submit', (e) => {
    e.preventDefault();
    if (!auth) return;
    errorEl.textContent = '';
    successEl.textContent = 'Creando cuenta...';

    const email = document.getElementById('register-email').value;
    const pass = document.getElementById('register-password').value;

    createUserWithEmailAndPassword(auth, email, pass)
      .then(() => {
        successEl.textContent = '¡Cuenta creada con éxito! Accediendo...';
      })
      .catch(error => {
        successEl.textContent = '';
        if (error.code === 'auth/email-already-in-use') {
          errorEl.textContent = 'Este correo electrónico ya está registrado.';
        } else if (error.code === 'auth/weak-password') {
          errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres.';
        } else {
          errorEl.textContent = 'Error: ' + error.message;
        }
      });
  });

  // 3. RECUPERAR CONTRASEÑA
  document.getElementById('reset-form').addEventListener('submit', (e) => {
    e.preventDefault();
    if (!auth) return;
    errorEl.textContent = '';
    successEl.textContent = 'Enviando enlace...';

    const email = document.getElementById('reset-email').value;

    sendPasswordResetEmail(auth, email)
      .then(() => {
        successEl.textContent = 'Enlace enviado. Revisa tu casilla de correo.';
        document.getElementById('reset-email').value = '';
      })
      .catch(error => {
        successEl.textContent = '';
        if (error.code === 'auth/user-not-found') {
          errorEl.textContent = 'No se encontró ningún usuario con este correo electrónico.';
        } else {
          errorEl.textContent = 'Error: ' + error.message;
        }
      });
  });

  // Función global para el botón "Cerrar sesión"
  window.logoutUser = function() {
    if (auth) signOut(auth);
  }
</script>
