<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inversiones 2026 · Patricio Tadeo</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg: #06101E;
  --card: #0C1A2E;
  --card2: #0F2040;
  --border: #162840;
  --text: #DDE6F0;
  --muted: #4E6880;
  --hapi: #3B82F6;
  --balanz: #10B981;
  --fiducia: #F59E0B;
  --sstate: #8B5CF6;
  --gain: #22C55E;
  --loss: #F43F5E;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }
.shell { max-width:1280px; margin:0 auto; padding:24px 16px 48px; }

/* Header */
.hdr { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
.hdr-left h1 { font-size:18px; font-weight:600; letter-spacing:-.01em; }
.hdr-left p  { font-size:12px; color:var(--muted); margin-top:3px; }
.hdr-right   { text-align:right; }
.hdr-right .lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.hdr-right .val { font-size:30px; font-weight:700; color:var(--gain); letter-spacing:-.02em; line-height:1; margin-top:2px; }

/* Cards row */
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin-bottom:20px; }
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px 18px;
  border-left:3px solid var(--c);
  cursor:pointer;
  transition:background .15s;
}
.card:hover { background:var(--card2); }
.card .c-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:6px; }
.card .c-val { font-size:26px; font-weight:700; color:var(--c); letter-spacing:-.02em; }
.card .c-sub { font-size:11px; color:var(--muted); margin-top:5px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.pill { display:inline-flex; align-items:center; font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px; }
.pill.up   { background:rgba(34,197,94,.12); color:#22C55E; }
.pill.down { background:rgba(244,63,94,.12);  color:#F43F5E; }
.pill.neu  { background:rgba(78,104,128,.15); color:var(--muted); }

/* Tabs */
.tabs { display:flex; gap:2px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:4px; margin-bottom:18px; overflow-x:auto; width:fit-content; }
.tab { padding:7px 16px; border-radius:7px; border:none; background:none; color:var(--muted); cursor:pointer; font-size:12px; font-weight:500; white-space:nowrap; transition:all .15s; }
.tab.on { background:var(--card2); color:var(--text); }

/* Panels */
.panel { display:none; }
.panel.on { display:block; }

/* Grid layouts */
.g2  { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.g1  { margin-bottom:14px; }
@media(max-width:720px){ .g2 { grid-template-columns:1fr; } }

/* Box */
.box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; }
.box-t { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.saved { font-size:10px; color:var(--gain); opacity:0; transition:opacity .3s; }
.saved.on { opacity:1; }

/* Charts */
.ch { position:relative; height:210px; }
.ch-lg { position:relative; height:280px; }

/* Table */
.tbl { width:100%; border-collapse:collapse; font-size:12.5px; }
.tbl th { padding:7px 10px; color:var(--muted); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; }
.tbl td { padding:8px 10px; border-bottom:1px solid rgba(22,40,64,.7); font-variant-numeric:tabular-nums; white-space:nowrap; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tr:hover td { background:rgba(255,255,255,.015); }
.tbl .r  { text-align:right; }
.tbl .mu { color:var(--muted); }
.tbl .g  { color:var(--gain); }
.tbl .l  { color:var(--loss); }

/* Editable input */
.inp {
  background:var(--card2); border:1px solid var(--border); border-radius:6px;
  color:var(--text); padding:4px 8px; width:88px; font-size:12px; text-align:right;
  outline:none; transition:border-color .15s;
}
.inp:focus { border-color:var(--hapi); }
.inp.filled { border-color:rgba(59,130,246,.3); }
.inp-lg { width:110px; padding:6px 10px; font-size:13px; font-weight:600; }

/* Month label */
.ml { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:.05em; }

/* Budget items */
.bgt { display:flex; flex-direction:column; gap:8px; }
.bgi { display:flex; justify-content:space-between; align-items:center; padding:9px 12px; background:var(--card2); border-radius:8px; font-size:13px; }
.bgi .bl { color:var(--muted); font-size:12px; }
.bgi .bv { font-weight:600; }
.bgi.total { background:none; border-top:1px solid var(--border); border-radius:0; padding-top:13px; margin-top:2px; }

/* Note box */
.note { background:rgba(59,130,246,.07); border:1px solid rgba(59,130,246,.2); border-radius:10px; padding:13px 15px; font-size:12px; color:var(--muted); line-height:1.6; margin-top:14px; }
.note strong { color:var(--text); }

/* Dot legend */
.dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
.legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:10px; }
.leg-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
</style>
</head>

    </div>
    <div class="hdr-right">
      <div class="lbl">Portafolio total</div>
